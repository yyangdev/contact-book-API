<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Задачи</h1>
            <span class="task-count" id="taskCount">0</span>
        </header>

        <div class="add-form">
            <div class="input-group">
                <input type="text" id="titleInput" placeholder="Название">
                <input type="text" id="descInput" placeholder="Описание">
            </div>
            <button id="addBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Добавить
            </button>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <div id="todoList"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
